name: Release Vocabulary Trainpack Manifests

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag, e.g. trainpack-2026.06.02
        required: true
      title:
        description: Release title
        required: false
        default: Vocabulary Trainpacks

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify manifests and schemas
        run: |
          test -f manifests/latest.json
          for file in schemas/*.json; do
            python3 -m json.tool "$file" >/dev/null
          done
          python3 -m json.tool manifests/latest.json >/dev/null
          for file in manifests/*.json; do
            python3 -m json.tool "$file" >/dev/null
          done
          ls -lh manifests
          shasum -a 256 manifests/*.json

      - name: Create or update release manifests
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          name: ${{ inputs.title }} ${{ inputs.tag }}
          files: |
            manifests/*.json
